<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research KB MVP</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260414-13" />
  </head>
  <body>
    <div class="site-shell app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Research Knowledge Base</p>
        </div>
        <div class="workspace-switch" role="tablist" aria-label="Workbench mode">
          <button id="layout-mode-wiki" class="workspace-switch-button active" type="button">
            Wiki
          </button>
          <button id="layout-mode-chat" class="workspace-switch-button" type="button">
            Chat
          </button>
        </div>
      </header>

      <main class="workbench-grid">
        <section class="workbench-wiki">
          <div class="panel wiki-sidebar">
            <div class="wiki-sidebar-header">
              <div class="source-switch" role="tablist" aria-label="Content source">
                <button id="mode-wiki" class="source-switch-button active" type="button">
                  Wiki
                </button>
                <button id="mode-raw" class="source-switch-button" type="button">
                  Raw
                </button>
              </div>
              <button id="toggle-wiki-sidebar-close" class="button button-secondary hidden" type="button">
                收起目录
              </button>
            </div>
            <div class="search-block">
              <label for="wiki-search">搜索内容</label>
              <input id="wiki-search" type="search" placeholder="输入标题、关键词或文件名" />
            </div>
            <div id="wiki-list" class="wiki-list"></div>
          </div>

          <section class="panel wiki-content-panel">
            <div class="wiki-meta">
              <div>
                <p id="wiki-category" class="eyebrow">Loading</p>
                <h2 id="wiki-title">正在加载页面</h2>
              </div>
              <div class="detail-actions">
                <button id="toggle-wiki-sidebar-open" class="button button-secondary" type="button">
                  目录
                </button>
                <button id="hide-wiki-panel-chat" class="button button-secondary floating-control" type="button">
                  隐藏
                </button>
                <a
                  id="open-source-file"
                  class="button button-secondary hidden"
                  href="#"
                  target="_blank"
                  rel="noreferrer"
                >
                  打开原文件
                </a>
                <button
                  id="wiki-history-back"
                  class="button button-secondary wiki-history-button"
                  type="button"
                  aria-label="返回上一篇 Wiki"
                  disabled
                >
                  ←
                </button>
                <button
                  id="wiki-history-forward"
                  class="button button-secondary wiki-history-button"
                  type="button"
                  aria-label="前进到下一篇 Wiki"
                  disabled
                >
                  →
                </button>
                <button id="quote-into-chat" class="button button-secondary" type="button">
                  引用
                </button>
              </div>
            </div>
            <article id="wiki-content" class="wiki-content"></article>
          </section>
        </section>

        <section class="panel chat-panel unified-chat-panel">
          <div class="chat-body">
            <aside id="session-sidebar" class="session-sidebar" aria-label="会话侧边栏">
              <div class="session-sidebar-top">
                <button
                  id="toggle-session-sidebar"
                  class="session-sidebar-toggle"
                  type="button"
                  aria-expanded="true"
                  aria-label="切换会话侧栏"
                >
                  <span class="session-sidebar-toggle-bar"></span>
                </button>
              </div>

              <div class="session-sidebar-actions">
                <button id="new-session-button" class="session-primary-action" type="button">
                  新聊天
                </button>
              </div>

              <div class="session-list-block">
                <ul id="session-list" class="session-list" aria-label="会话列表"></ul>
                <p id="session-list-empty" class="session-list-empty">暂无历史会话</p>
              </div>
            </aside>

            <div class="chat-main">
              <div class="chat-panel-header">
                <div class="chat-panel-actions">
                  <button
                    id="toggle-session-sidebar-main"
                    class="session-sidebar-toggle chat-main-sidebar-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-label="切换会话侧栏"
                  >
                    <span class="session-sidebar-toggle-bar"></span>
                  </button>
                  <button id="hide-chat-panel" class="button button-secondary floating-control" type="button">
                    隐藏
                  </button>
                </div>
              </div>

              <div id="messages" class="messages"></div>
              <form id="chat-form" class="chat-form">
                <div class="chat-input-shell">
                  <textarea
                    id="chat-input"
                    name="message"
                    rows="3"
                    placeholder="问点什么，比如：这个方向有哪些值得做的 gap？"
                  ></textarea>
                  <button class="chat-submit-button" type="submit" aria-label="发送">
                    <span class="chat-submit-icon" aria-hidden="true">↑</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>
      </main>

      <div class="floating-dock">
        <button id="show-wiki-panel" class="button button-primary hidden" type="button">
          打开 Wiki
        </button>
        <button id="show-chat-panel" class="button button-primary hidden" type="button">
          打开 Chat
        </button>
      </div>
    </div>

    <script src="/assets/workbench.js?v=20260414-13"></script>
    <script src="/assets/wiki.js?v=20260414-13"></script>
    <script src="/assets/chat.js?v=20260414-13"></script>
  </body>
</html>
