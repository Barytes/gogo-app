<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research KB MVP</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="site-shell app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Research Knowledge Base</p>
        </div>
        <div class="workspace-switch" role="tablist" aria-label="Workbench mode">
          <button id="layout-mode-wiki" class="workspace-switch-button active" type="button">
            Wiki
          </button>
          <button id="layout-mode-chat" class="workspace-switch-button" type="button">
            Chat
          </button>
        </div>
      </header>

      <main class="workbench-grid">
        <section class="workbench-wiki">
          <div class="panel wiki-sidebar">
            <div class="wiki-sidebar-header">
              <div class="source-switch" role="tablist" aria-label="Content source">
                <button id="mode-wiki" class="source-switch-button active" type="button">
                  Wiki
                </button>
                <button id="mode-raw" class="source-switch-button" type="button">
                  Raw
                </button>
              </div>
              <button id="toggle-wiki-sidebar-close" class="button button-secondary hidden" type="button">
                收起目录
              </button>
            </div>
            <div class="search-block">
              <label for="wiki-search">搜索内容</label>
              <input id="wiki-search" type="search" placeholder="输入标题、关键词或文件名" />
            </div>
            <div id="wiki-list" class="wiki-list"></div>
          </div>

          <section class="panel wiki-content-panel">
            <div class="wiki-meta">
              <div>
                <p id="wiki-category" class="eyebrow">Loading</p>
                <h2 id="wiki-title">正在加载页面</h2>
              </div>
              <div class="detail-actions">
                <button id="toggle-wiki-sidebar-open" class="button button-secondary" type="button">
                  目录
                </button>
                <button id="hide-wiki-panel-chat" class="button button-secondary floating-control" type="button">
                  隐藏
                </button>
                <a
                  id="open-source-file"
                  class="button button-secondary hidden"
                  href="#"
                  target="_blank"
                  rel="noreferrer"
                >
                  打开原文件
                </a>
                <button id="quote-into-chat" class="button button-secondary" type="button">
                  引用
                </button>
              </div>
            </div>
            <article id="wiki-content" class="wiki-content"></article>
          </section>
        </section>

        <section class="panel chat-panel unified-chat-panel">
          <div class="chat-panel-header">
            <div class="chat-panel-actions">
              <button id="hide-chat-panel" class="button button-secondary floating-control" type="button">
                隐藏 Chat
              </button>
              <button id="new-session-button" class="button button-primary" type="button">
                新建会话
              </button>
            </div>
            <div class="session-selector-block">
              <label for="session-selector">会话</label>
              <select id="session-selector" class="session-selector"></select>
              <button id="delete-session-button" class="button button-secondary" type="button" title="删除当前会话">
                删除
              </button>
            </div>
          </div>

          <div id="messages" class="messages"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="chat-input"
              name="message"
              rows="3"
              placeholder="问点什么，比如：这个方向有哪些值得做的 gap？"
            ></textarea>
            <div class="chat-actions">
              <button class="button button-primary" type="submit">发送</button>
            </div>
          </form>
        </section>
      </main>

      <div class="floating-dock">
        <button id="show-wiki-panel" class="button button-primary hidden" type="button">
          打开 Wiki
        </button>
        <button id="show-chat-panel" class="button button-primary hidden" type="button">
          打开 Chat
        </button>
      </div>
    </div>

    <script src="/assets/workbench.js"></script>
    <script src="/assets/wiki.js"></script>
    <script src="/assets/chat.js"></script>
  </body>
</html>
