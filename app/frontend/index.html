<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research KB MVP</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260415-6" />
  </head>
  <body>
    <div class="site-shell app-shell">
	      <header class="topbar">
	        <div class="app-title-row">
	          <button
	            id="open-settings-panel"
	            class="topbar-icon-button"
	            type="button"
	            aria-label="打开设置面板"
	            title="设置"
	          >
	            ⚙
	          </button>
	          <p id="knowledge-base-name" class="eyebrow">Knowledge Base</p>
	        </div>
	        <div class="workspace-switch" role="tablist" aria-label="Workbench mode">
          <button id="layout-mode-wiki" class="workspace-switch-button active" type="button">
            Wiki
          </button>
          <button id="layout-mode-chat" class="workspace-switch-button" type="button">
            Chat
          </button>
        </div>
      </header>

      <main class="workbench-grid">
        <section class="workbench-wiki">
          <div class="panel wiki-sidebar">
            <div class="wiki-sidebar-header">
              <div class="source-switch" role="tablist" aria-label="Content source">
                <button id="mode-wiki" class="source-switch-button active" type="button">
                  Wiki
                </button>
                <button id="mode-raw" class="source-switch-button" type="button">
                  Raw
                </button>
              </div>
              <button id="toggle-wiki-sidebar-close" class="button button-secondary hidden" type="button">
                收起目录
              </button>
            </div>
            <div class="search-block">
              <label for="wiki-search">搜索内容</label>
              <input id="wiki-search" type="search" placeholder="输入标题、关键词或文件名" />
            </div>
            <div id="wiki-list" class="wiki-list"></div>
          </div>

          <section class="panel wiki-content-panel">
            <div class="wiki-meta">
              <div>
                <p id="wiki-category" class="eyebrow">Loading</p>
                <h2 id="wiki-title">正在加载页面</h2>
              </div>
              <div class="detail-actions">
                <button id="toggle-wiki-sidebar-open" class="button button-secondary" type="button">
                  目录
                </button>
                <button id="hide-wiki-panel-chat" class="button button-secondary floating-control" type="button">
                  隐藏
                </button>
                <a
                  id="open-source-file"
                  class="button button-secondary hidden"
                  href="#"
                  target="_blank"
                  rel="noreferrer"
                >
                  打开原文件
                </a>
                <button
                  id="wiki-history-back"
                  class="button button-secondary wiki-history-button"
                  type="button"
                  aria-label="返回上一篇 Wiki"
                  disabled
                >
                  ←
                </button>
                <button
                  id="wiki-history-forward"
                  class="button button-secondary wiki-history-button"
                  type="button"
                  aria-label="前进到下一篇 Wiki"
                  disabled
                >
                  →
                </button>
                <button id="quote-into-chat" class="button button-secondary" type="button">
                  引用
                </button>
              </div>
            </div>
            <article id="wiki-content" class="wiki-content"></article>
          </section>
        </section>

        <section class="panel chat-panel unified-chat-panel">
          <div class="chat-body">
            <aside id="session-sidebar" class="session-sidebar" aria-label="会话侧边栏">
              <div class="session-sidebar-top">
                <button
                  id="toggle-session-sidebar"
                  class="session-sidebar-toggle"
                  type="button"
                  aria-expanded="true"
                  aria-label="切换会话侧栏"
                >
                  <span class="session-sidebar-toggle-bar"></span>
                </button>
              </div>

              <div class="session-sidebar-actions">
                <button id="new-session-button" class="session-primary-action" type="button">
                  新聊天
                </button>
              </div>

              <div class="session-list-block">
                <ul id="session-list" class="session-list" aria-label="会话列表"></ul>
                <p id="session-list-empty" class="session-list-empty">暂无历史会话</p>
              </div>
            </aside>

            <div class="chat-main">
              <div class="chat-panel-header">
                <div class="chat-panel-actions">
                  <button
                    id="toggle-session-sidebar-main"
                    class="session-sidebar-toggle chat-main-sidebar-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-label="切换会话侧栏"
                  >
                    <span class="session-sidebar-toggle-bar"></span>
                  </button>
                  <button id="hide-chat-panel" class="button button-secondary floating-control" type="button">
                    隐藏
                  </button>
                </div>
              </div>

              <div id="messages" class="messages"></div>
	              <form id="chat-form" class="chat-form">
	                <input
	                  id="chat-upload-input"
	                  type="file"
	                  hidden
	                  multiple
	                  accept=".pdf,.md,.txt,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.csv,.tsv,.json,.yaml,.yml,.png,.jpg,.jpeg,.webp"
	                />
	                <div class="chat-input-shell">
	                  <div class="chat-composer-controls">
	                    <button
	                      id="chat-upload-button"
	                      class="chat-control-button chat-control-icon-button"
	                      type="button"
	                      aria-label="上传文件"
	                      title="上传文件"
	                    >
	                      +
	                    </button>
	                    <div class="chat-control-menu-shell">
	                      <button
	                        id="chat-model-button"
	                        class="chat-control-button"
	                        type="button"
	                        aria-haspopup="menu"
	                        aria-expanded="false"
	                      >
	                        模型
	                      </button>
	                      <div id="chat-model-menu" class="chat-control-menu hidden" role="menu"></div>
	                    </div>
	                    <div class="chat-control-menu-shell">
	                      <button
	                        id="chat-thinking-button"
	                        class="chat-control-button"
	                        type="button"
	                        aria-haspopup="menu"
	                        aria-expanded="false"
	                      >
	                        思考水平
	                      </button>
	                      <div id="chat-thinking-menu" class="chat-control-menu hidden" role="menu"></div>
	                    </div>
	                  </div>
	                  <p id="chat-settings-hint" class="chat-settings-hint hidden" aria-live="polite"></p>
	                  <textarea
	                    id="chat-input"
	                    name="message"
	                    rows="3"
                    placeholder="问点什么，比如：这个方向有哪些值得做的 gap？"
                  ></textarea>
                  <button class="chat-submit-button" type="submit" aria-label="发送">
                    <span class="chat-submit-icon" aria-hidden="true">↑</span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </section>
      </main>

	      <div class="floating-dock">
	        <button id="toggle-inbox-panel" class="button button-primary inbox-dock-button" type="button">
	          Inbox
	          <span id="inbox-count-badge" class="inbox-count-badge">0</span>
	        </button>
        <button id="show-wiki-panel" class="button button-primary hidden" type="button">
          打开 Wiki
        </button>
	        <button id="show-chat-panel" class="button button-primary hidden" type="button">
	          打开 Chat
	        </button>
	      </div>

	      <aside id="inbox-panel" class="inbox-panel hidden" aria-label="Inbox 文件列表">
	        <div class="inbox-panel-header">
	          <div>
	            <p class="eyebrow">Inbox</p>
	            <h2>待 ingest 文件</h2>
	          </div>
	          <div class="inbox-panel-actions">
	            <button id="refresh-inbox-panel" class="button button-secondary" type="button">刷新</button>
	            <button id="ingest-inbox-panel" class="button button-primary" type="button">ingest</button>
	            <button id="close-inbox-panel" class="button button-secondary" type="button">关闭</button>
	          </div>
	        </div>
	        <p id="inbox-panel-feedback" class="inbox-panel-feedback hidden" aria-live="polite"></p>
	        <p class="inbox-panel-drop-hint">把文件拖到这个面板，或拖到右下角 Inbox 按钮，也可以直接上传。</p>
	        <div id="inbox-file-list" class="inbox-file-list"></div>
	        <p id="inbox-file-empty" class="inbox-file-empty hidden">当前知识库的 inbox 里还没有文件。</p>
	      </aside>

	      <div id="settings-overlay" class="settings-overlay hidden">
	        <section class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-panel-title">
	          <div class="settings-panel-header">
	            <div>
	              <p class="eyebrow">Settings</p>
	              <h2 id="settings-panel-title">工作台设置</h2>
	            </div>
	            <button id="close-settings-panel" class="button button-secondary" type="button">关闭</button>
	          </div>
	          <div class="settings-section">
	            <label for="knowledge-base-path-input">知识库路径</label>
	            <input
	              id="knowledge-base-path-input"
	              class="settings-input"
	              type="text"
	              placeholder="/Users/you/Desktop/Index"
	            />
	            <p id="knowledge-base-path-help" class="settings-help">
	              当前知识库名称会显示在左上角。切换后会自动隔离该知识库对应的会话目录，不会与其他知识库共用会话历史。
	            </p>
	            <div class="settings-actions">
	              <button id="apply-knowledge-base-path" class="button button-primary" type="button">
	                切换知识库
	              </button>
	            </div>
	            <div class="settings-subsection">
	              <p class="settings-subtitle">最近使用</p>
	              <div id="knowledge-base-recent-list" class="settings-chip-list"></div>
	            </div>
	            <p id="knowledge-base-settings-feedback" class="settings-feedback hidden" aria-live="polite"></p>
	          </div>
	        </section>
	      </div>
	    </div>

	    <script src="/assets/workbench.js?v=20260415-7"></script>
	    <script src="/assets/wiki.js?v=20260415-7"></script>
	    <script src="/assets/chat.js?v=20260415-7"></script>
  </body>
</html>
